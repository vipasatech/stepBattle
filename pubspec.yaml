name: stepbattle
description: "StepBattle — Fitness gamification app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  google_sign_in: ^6.2.2
  firebase_messaging: ^15.2.4
  firebase_storage: ^12.4.4

  # Health Data
  health: ^11.1.0
  pedometer: ^4.0.2

  # Permissions
  permission_handler: ^11.3.1

  # Background Tasks
  workmanager: ^0.5.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Maps & Location (deferred to v2)
  # google_maps_flutter: ^2.10.0
  # geolocator: ^13.0.2

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  shimmer: ^3.0.0

  # Networking + device fingerprinting (used by Google Fit fallback +
  # source_step_hourly analytics logs)
  http: ^1.2.2
  device_info_plus: ^10.1.2
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
