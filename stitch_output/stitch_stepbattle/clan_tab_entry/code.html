<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StepBattle - Clan</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-high": "#1f1f22",
                    "surface-container": "#19191c",
                    "tertiary-dim": "#e48fed",
                    "secondary-container": "#1e3da1",
                    "outline": "#767577",
                    "on-tertiary-fixed": "#41004d",
                    "on-tertiary": "#6b1f77",
                    "on-surface": "#fefbfe",
                    "on-error-container": "#ffa8a3",
                    "error-dim": "#d7383b",
                    "on-secondary-fixed": "#00298c",
                    "on-secondary-container": "#c4ceff",
                    "on-primary-container": "#00214e",
                    "primary-dim": "#679dff",
                    "surface-container-lowest": "#000000",
                    "background": "#0e0e10",
                    "on-error": "#490006",
                    "surface-dim": "#0e0e10",
                    "on-primary-fixed-variant": "#002a60",
                    "surface": "#0e0e10",
                    "primary-fixed-dim": "#5091ff",
                    "on-tertiary-fixed-variant": "#6a1f77",
                    "on-secondary": "#00185d",
                    "primary-container": "#6c9fff",
                    "tertiary": "#fab0ff",
                    "surface-container-highest": "#252528",
                    "secondary-fixed-dim": "#b3c1ff",
                    "secondary": "#7e98ff",
                    "surface-bright": "#2c2c2f",
                    "on-tertiary-container": "#60136d",
                    "surface-tint": "#84adff",
                    "error": "#ff716c",
                    "error-container": "#9f0519",
                    "inverse-on-surface": "#555557",
                    "secondary-fixed": "#c6cfff",
                    "surface-variant": "#252528",
                    "on-primary-fixed": "#000000",
                    "primary": "#84adff",
                    "outline-variant": "#48474a",
                    "tertiary-container": "#f39cfb",
                    "on-background": "#fefbfe",
                    "on-surface-variant": "#acaaad",
                    "inverse-surface": "#fcf8fb",
                    "tertiary-fixed-dim": "#e48fed",
                    "on-primary": "#002c65",
                    "inverse-primary": "#005bc1",
                    "on-secondary-fixed-variant": "#2b48ac",
                    "tertiary-fixed": "#f39cfb",
                    "primary-fixed": "#6c9fff",
                    "surface-container-low": "#131315",
                    "secondary-dim": "#7e98ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-nav-glow {
            filter: drop-shadow(0 0 8px rgba(132, 173, 255, 0.5));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col selection:bg-primary/30">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-gradient-to-b from-[#1c1c1f] to-[#0e0e10] shadow-[0_4px_20px_rgba(26,115,232,0.1)] z-50 flex items-center justify-between px-6 h-16">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#1A73E8] text-2xl" data-icon="sports_kabaddi">sports_kabaddi</span>
<h1 class="text-2xl font-bold text-[#1A73E8] font-['Space_Grotesk'] tracking-tight uppercase">CLAN</h1>
</div>
<div class="flex items-center gap-4">
<button class="hover:opacity-80 transition-opacity active:scale-95 text-gray-500">
<span class="material-symbols-outlined">notifications</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-8 pb-32 text-center relative overflow-hidden">
<!-- Ambient Background Accents -->
<div class="absolute top-1/4 -left-20 w-64 h-64 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-1/4 -right-20 w-80 h-80 bg-tertiary/5 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Illustration Section -->
<div class="relative mb-12 group">
<div class="absolute inset-0 bg-primary/20 blur-[60px] rounded-full scale-75 group-hover:scale-90 transition-transform duration-700"></div>
<div class="relative w-64 h-64 flex items-center justify-center bg-surface-container-low rounded-full border border-white/5 shadow-2xl backdrop-blur-sm">
<span class="material-symbols-outlined text-[120px] text-primary drop-shadow-[0_0_15px_rgba(132,173,255,0.4)]" data-icon="shield" style="font-variation-settings: 'FILL' 1;">shield</span>
<!-- Asymmetric "spark" elements -->
<div class="absolute top-4 right-8 w-3 h-3 bg-tertiary rounded-full animate-pulse"></div>
<div class="absolute bottom-10 left-4 w-2 h-2 bg-primary-container rounded-full opacity-60"></div>
</div>
</div>
<!-- Text Content -->
<div class="max-w-xs space-y-4">
<h2 class="text-4xl font-headline font-bold leading-tight tracking-tight text-on-surface">
                Join the Battle Together
            </h2>
<p class="text-on-surface-variant font-body font-medium leading-relaxed">
                Team up. Compete together. Dominate the leaderboard.
            </p>
</div>
<!-- Action Section -->
<div class="w-full max-w-sm mt-16 space-y-4 px-4">
<button class="w-full bg-gradient-to-r from-[#1A73E8] to-primary-container text-on-primary font-headline font-bold py-5 rounded-full shadow-[0_8px_20px_rgba(26,115,232,0.3)] hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                CREATE CLAN
                <span class="material-symbols-outlined text-xl">add_circle</span>
</button>
<button class="w-full bg-surface-container-high text-on-surface font-headline font-bold py-5 rounded-full border border-white/5 hover:bg-surface-bright active:scale-[0.98] transition-all">
                JOIN CLAN
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 h-20 pb-safe bg-[#0e0e10]/80 backdrop-blur-xl z-50 border-t border-white/5 shadow-[0_-8px_30px_rgba(0,0,0,0.5)]">
<!-- Arena -->
<a class="flex flex-col items-center justify-center text-gray-600 hover:text-[#84adff] transition-colors active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-widest mt-1">Arena</span>
</a>
<!-- Battles -->
<a class="flex flex-col items-center justify-center text-gray-600 hover:text-[#84adff] transition-colors active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="swords">swords</span>
<span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-widest mt-1">Battles</span>
</a>
<!-- Missions (Active for Clan Tab Context) -->
<a class="flex flex-col items-center justify-center text-[#84adff] scale-110 drop-shadow-[0_0_8px_rgba(132,173,255,0.5)] active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="military_tech" style="font-variation-settings: 'FILL' 1;">military_tech</span>
<span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-widest mt-1">Missions</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-gray-600 hover:text-[#84adff] transition-colors active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-widest mt-1">Profile</span>
</a>
</nav>
<!-- Decorative Screen Texture -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] contrast-150 mix-blend-overlay">
<div class="w-full h-full bg-[radial-gradient(#fff_1px,transparent_1px)] [background-size:20px_20px]"></div>
</div>
</body></html>
